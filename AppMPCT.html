<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Collège Quiz - Maths • Physique • Chimie • Technologie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --whatsapp: #25D366;
            --maths: #3498db;
            --physique: #e67e22;
            --chimie: #2ecc71;
            --techno: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: clamp(10px, 3vw, 20px);
        }

        .app-container {
            max-width: min(1400px, 95%);
            margin: 0 auto;
        }

        .main-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-header h1 {
            font-size: clamp(1.8em, 7vw, 3.2em);
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .subtitle {
            color: white;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .rule-info {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            text-align: center;
            padding: 10px 15px;
            border-radius: 50px;
            margin-bottom: 20px;
            font-size: 0.95em;
            font-weight: bold;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .class-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .class-tab {
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid transparent;
        }

        .class-tab.active {
            background: white;
            color: var(--dark);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .subject-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .subject-tab {
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
            color: white;
        }

        .subject-tab.active {
            background: white;
            color: var(--dark);
            transform: scale(1.02);
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(320px, 100%), 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            padding: 25px 20px;
            text-align: center;
            color: white;
        }

        .card-header.problemes { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .card-header.quiz { background: linear-gradient(135deg, #3498db, #2980b9); }
        .card-header.vrai-faux { background: linear-gradient(135deg, #2ecc71, #27ae60); }

        .card-header .emoji {
            font-size: 3em;
            display: block;
            margin-bottom: 10px;
        }

        .card-header h3 {
            font-size: 1.4em;
        }

        .card-body {
            padding: 20px;
            background: #f8f9fa;
        }

        .card-body .description {
            color: #555;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .card-body .stats {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.8em;
            color: #777;
            margin-bottom: 15px;
        }

        .start-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--success), #27ae60);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.02);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 30px;
            border-radius: 25px;
            max-width: 450px;
            width: 90%;
            color: white;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            text-align: center;
        }

        .modal-content button {
            background: var(--warning);
            color: var(--dark);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .quiz-active-container {
            background: white;
            border-radius: 25px;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            background: #95a5a6;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .timer-container {
            background: var(--dark);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .timer-display {
            font-family: monospace;
            font-size: 1.6em;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 30px;
        }

        .progress-container {
            background: #ecf0f1;
            border-radius: 15px;
            height: 20px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--warning), #e67e22);
            width: 0%;
            transition: width 0.3s;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .partie-score {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            position: relative;
        }

        .partie-score.completed { background: linear-gradient(135deg, var(--success), #27ae60); }
        .partie-score.locked { background: #95a5a6; opacity: 0.7; }
        .partie-score.current { border: 3px solid var(--warning); transform: scale(1.02); }

        .partie-score .requirement {
            font-size: 0.7em;
            margin-top: 5px;
            opacity: 0.9;
        }

        .partie-section {
            margin: 20px 0;
            border: 3px solid #3498db;
            border-radius: 15px;
            overflow: hidden;
        }

        .partie-header {
            background: linear-gradient(135deg, #3498db, #2980b9);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            color: white;
        }

        .partie-content {
            padding: 20px;
            background: #f0f9ff;
        }

        .partie-content.locked {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .question {
            background: white;
            border-left: 8px solid var(--warning);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 15px 15px 0;
        }

        .question.answered { border-left-color: var(--success); }

        .options {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
        }

        .options li {
            padding: 10px 20px;
            background: #e9ecef;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options li.correct { background: var(--success); color: white; }
        .options li.incorrect { background: var(--danger); color: white; }

        .btn-nav {
            background: var(--dark);
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-nav.next { background: var(--success); }
        .btn-nav:disabled { opacity: 0.5; cursor: not-allowed; }

        .reponse-cachee {
            display: none;
            background: #e3f2fd;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .badge {
            background: var(--warning);
            color: white;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.85em;
        }

        .badge.unlocked { background: var(--success); }

        .reponse-input {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 15px 0;
        }

        .reponse-input input, .reponse-input select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #3498db;
        }

        .btn-valider-reponse {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .feedback-correct { background: #d4edda; color: #155724; padding: 8px; border-radius: 8px; margin-top: 10px; }
        .feedback-incorrect { background: #f8d7da; color: #721c24; padding: 8px; border-radius: 8px; margin-top: 10px; }

        .whatsapp-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--whatsapp), #128C7E);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @media (max-width: 480px) {
            .whatsapp-badge span:last-child { display: none; }
            .whatsapp-badge { padding: 12px; border-radius: 50%; }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 3000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .btn-valider-partie {
            background: linear-gradient(135deg, var(--success), #27ae60);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-valider-partie:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-valider-partie:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .success-message {
            background: linear-gradient(135deg, var(--success), #27ae60);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 15px 0;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .error-message {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 15px 0;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="main-header">
        <h1>📚 Collège Quiz Academy 🎓</h1>
        <div class="subtitle">Maths • Physique • Chimie • Technologie - De la 6ème à la 3ème</div>
        <div class="rule-info">⭐ RÈGLE D'OR : Pour débloquer la partie suivante, il faut 100% de bonnes réponses ! ⭐</div>
    </div>

    <div class="class-tabs" id="classTabs">
        <div class="class-tab active" data-classe="6">6ème 📘</div>
        <div class="class-tab" data-classe="5">5ème 📙</div>
        <div class="class-tab" data-classe="4">4ème 📕</div>
        <div class="class-tab" data-classe="3">3ème 📗</div>
    </div>

    <div class="subject-tabs" id="subjectTabs">
        <div class="subject-tab active" data-subject="maths">📐 Mathématiques</div>
        <div class="subject-tab" data-subject="physique">⚡ Physique</div>
        <div class="subject-tab" data-subject="chimie">🧪 Chimie</div>
        <div class="subject-tab" data-subject="techno">💻 Technologie</div>
    </div>

    <div id="cardsContainer" class="cards-container"></div>
</div>

<div class="whatsapp-badge" onclick="ouvrirWhatsAppContact()">
    <span>📱</span>
    <span>Contact professeur</span>
</div>

<div id="notification" style="display: none;"></div>

<script>
    // Numéro WhatsApp du professeur
    const WHATSAPP_NUMBER = "+22892871605";
    
    // ==================== DONNÉES COMPLÈTES ====================
    const QUIZ_DATAS = {
        maths: {
            nom: "Mathématiques",
            "6": {
                parties: [
                    { nom: "Nombres et opérations", emoji: "🔢", questions: [
                        { type: "qcm", texte: "12 + 15 = ?", options: ["25", "27", "28", "30"], correct: "1", explication: "12 + 15 = 27" },
                        { type: "qcm", texte: "8 × 7 = ?", options: ["48", "56", "64", "42"], correct: "1", explication: "8 × 7 = 56" },
                        { type: "vf", texte: "125 est divisible par 5.", correct: "VRAI", explication: "✅ 125 se termine par 5." },
                        { type: "probleme", titre: "Périmètre d'un carré", enonce: "Un carré a un côté de 6 cm. Quel est son périmètre ?", reponse: { type: "nombre", correct: "24" }, explication: "Périmètre = 4 × 6 = 24 cm." }
                    ] },
                    { nom: "Géométrie de base", emoji: "📐", questions: [
                        { type: "qcm", texte: "Un triangle a combien de côtés ?", options: ["2", "3", "4", "5"], correct: "1", explication: "Un triangle a 3 côtés." },
                        { type: "qcm", texte: "Un angle droit mesure ?", options: ["45°", "90°", "180°", "360°"], correct: "1", explication: "90°" },
                        { type: "vf", texte: "Un carré a 4 côtés égaux.", correct: "VRAI", explication: "✅ Propriété du carré." }
                    ] }
                ]
            },
            "5": { parties: [{ nom: "Fractions", emoji: "➗", questions: [{ type: "qcm", texte: "1/2 + 1/4 = ?", options: ["2/6", "3/4", "1/3", "2/4"], correct: "1", explication: "1/2 = 2/4, donc 3/4" }] }] },
            "4": { parties: [{ nom: "Pythagore", emoji: "📐", questions: [{ type: "probleme", titre: "Hypoténuse", enonce: "Côtés 6 et 8 cm. Hypoténuse ?", reponse: { type: "nombre", correct: "10" }, explication: "√(36+64)=10" }] }] },
            "3": { parties: [{ nom: "Trigonométrie", emoji: "📐", questions: [{ type: "probleme", titre: "Sinus", enonce: "Opposé=5, hypoténuse=10. Sinus ?", reponse: { type: "nombre", correct: "0.5" }, explication: "sin=5/10=0.5" }] }] }
        },
        physique: {
            nom: "Physique",
            "6": { parties: [{ nom: "États de la matière", emoji: "💧", questions: [{ type: "vf", texte: "La glace fond à 0°C.", correct: "VRAI", explication: "✅ 0°C" }] }] },
            "5": { parties: [{ nom: "Mouvement", emoji: "🏃", questions: [{ type: "probleme", titre: "Vitesse", enonce: "30 km en 2h. Vitesse ?", reponse: { type: "nombre", correct: "15" }, explication: "30/2=15 km/h" }] }] },
            "4": { parties: [{ nom: "Loi d'Ohm", emoji: "⚡", questions: [{ type: "probleme", titre: "Résistance", enonce: "U=12V, I=2A. R ?", reponse: { type: "nombre", correct: "6" }, explication: "R=U/I=6Ω" }] }] },
            "3": { parties: [{ nom: "Puissance", emoji: "🔋", questions: [{ type: "probleme", titre: "Puissance", enonce: "12V, 0,5A. P ?", reponse: { type: "nombre", correct: "6" }, explication: "P=U×I=6W" }] }] }
        },
        chimie: {
            nom: "Chimie",
            "6": { parties: [{ nom: "Mélanges", emoji: "🧪", questions: [{ type: "vf", texte: "Le sel se dissout dans l'eau.", correct: "VRAI", explication: "✅ Le sel est soluble." }] }] },
            "5": { parties: [{ nom: "Dissolution", emoji: "💧", questions: [{ type: "qcm", texte: "La solubilité du sucre augmente avec...", options: ["La température", "La pression", "Le volume"], correct: "0", explication: "Plus l'eau est chaude." }] }] },
            "4": { parties: [{ nom: "Atomes", emoji: "⚛️", questions: [{ type: "qcm", texte: "L'atome est composé de...", options: ["Noyau et électrons", "Protons et neutrons"], correct: "0", explication: "Noyau + électrons." }] }] },
            "3": { parties: [{ nom: "Réactions", emoji: "⚗️", questions: [{ type: "probleme", titre: "Équilibre", enonce: "2H2 + O2 → ? H2O", reponse: { type: "nombre", correct: "2" }, explication: "2H2 + O2 → 2H2O" }] }] }
        },
        techno: {
            nom: "Technologie",
            "6": { parties: [{ nom: "Objets techniques", emoji: "🔧", questions: [{ type: "vf", texte: "Une chaise est un objet technique.", correct: "VRAI", explication: "✅ Fabriquée par l'homme." }] }] },
            "5": { parties: [{ nom: "Matériaux", emoji: "🧱", questions: [{ type: "qcm", texte: "Le bois est un matériau...", options: ["Naturel", "Synthétique"], correct: "0", explication: "Bois = naturel." }] }] },
            "4": { parties: [{ nom: "Énergies", emoji: "🔋", questions: [{ type: "qcm", texte: "Énergie renouvelable ?", options: ["Solaire", "Charbon"], correct: "0", explication: "Solaire est renouvelable." }] }] },
            "3": { parties: [{ nom: "Programmation", emoji: "💻", questions: [{ type: "vf", texte: "Python est un langage de programmation.", correct: "VRAI", explication: "✅ Python est un langage." }] }] }
        }
    };

    let currentClasse = "6";
    let currentSubject = "maths";
    let currentMode = null;
    let nomEleve = "";
    let prenomEleve = "";
    let quizState = null;
    let timerInterval = null;
    let tempsRestant = 0;
    let tempsDepart = 0;
    let partiesEnvoyees = {};

    function afficherNotif(msg, type = "info") {
        const notif = document.getElementById('notification');
        notif.style.display = 'block';
        notif.innerHTML = msg;
        notif.style.background = type === 'success' ? '#2ecc71' : (type === 'warning' ? '#f1c40f' : '#3498db');
        notif.style.color = 'white';
        notif.style.padding = '12px 20px';
        notif.style.borderRadius = '10px';
        setTimeout(() => notif.style.display = 'none', 4000);
    }

    function ouvrirWhatsAppContact() {
        window.open(`https://wa.me/${WHATSAPP_NUMBER.replace('+', '')}?text=Bonjour! Je suis intéressé(e) par les quiz de révision.`, '_blank');
    }

    // Fonction d'envoi des résultats par WhatsApp
    function envoyerResultatsWhatsApp(partieIndex, score, total, tempsUtilise, reussi) {
        const nomComplet = `${prenomEleve} ${nomEleve}`.trim();
        const partieNom = QUIZ_DATAS[currentSubject][currentClasse].parties[partieIndex].nom;
        const matiereNom = QUIZ_DATAS[currentSubject].nom;
        const classeNom = `${currentClasse}ème`;
        
        // Formater le temps (secondes -> minutes:secondes)
        const minutes = Math.floor(tempsUtilise / 60);
        const secondes = tempsUtilise % 60;
        const tempsFormate = `${minutes.toString().padStart(2, '0')}:${secondes.toString().padStart(2, '0')}`;
        
        const pourcentage = Math.round((score / total) * 100);
        const statut = reussi ? "✅ RÉUSSI (100%)" : "❌ ÉCHEC (moins de 100%)";
        
        // Construction du message
        let message = `📊 *RAPPORT D'ACTIVITÉ - QUIZ* 📊\n\n`;
        message += `👤 *Élève* : ${nomComplet}\n`;
        message += `📚 *Classe* : ${classeNom}\n`;
        message += `📖 *Matière* : ${matiereNom}\n`;
        message += `📌 *Thème* : ${partieNom}\n`;
        message += `🎯 *Type* : ${currentMode === 'problemes' ? 'Problèmes' : (currentMode === 'quiz' ? 'Quiz QCM' : 'Vrai/Faux')}\n\n`;
        message += `━━━━━━━━━━━━━━━━━━━━\n`;
        message += `📝 *Résultat* : ${score}/${total} bonnes réponses\n`;
        message += `📈 *Pourcentage* : ${pourcentage}%\n`;
        message += `⏱️ *Temps écoulé* : ${tempsFormate}\n`;
        message += `🏆 *Statut* : ${statut}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        
        if (pourcentage === 100) {
            message += `🎉 *FÉLICITATIONS !* 🎉\n`;
            message += `Tu as obtenu un score parfait ! Continue comme ça ! 🌟\n`;
        } else if (pourcentage >= 75) {
            message += `👍 *TRÈS BIEN !* 👍\n`;
            message += `Presque parfait, encore un petit effort !\n`;
        } else if (pourcentage >= 50) {
            message += `📚 *BON TRAVAIL !* 📚\n`;
            message += `Tu progresses, continue à t'entraîner !\n`;
        } else {
            message += `💪 *REVIENS PLUS FORT !* 💪\n`;
            message += `Révise et réessaie, tu vas y arriver !\n`;
        }
        
        message += `\n📱 *Collège Quiz Academy* - ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR')}`;
        
        // Encoder le message pour WhatsApp
        const messageEncode = encodeURIComponent(message);
        const urlWhatsApp = `https://wa.me/${WHATSAPP_NUMBER.replace('+', '')}?text=${messageEncode}`;
        
        // Ouvrir WhatsApp dans un nouvel onglet
        window.open(urlWhatsApp, '_blank');
        
        afficherNotif(`📱 Résultats envoyés au professeur par WhatsApp !`, "success");
    }

    function sauvegarderEtat() {
        if (currentMode && nomEleve) {
            localStorage.setItem(`quiz_${currentSubject}_${currentClasse}_${currentMode}_${nomEleve}_${prenomEleve}`, JSON.stringify(quizState));
        }
    }

    function initQuizState(classe, subject, mode) {
        const data = QUIZ_DATAS[subject][classe];
        const saved = localStorage.getItem(`quiz_${subject}_${classe}_${mode}_${nomEleve}_${prenomEleve}`);
        if (saved) {
            quizState = JSON.parse(saved);
            partiesEnvoyees = quizState.partiesEnvoyees || {};
        } else {
            quizState = {
                currentPartie: 0,
                partiesEnvoyees: {},
                parties: data.parties.map((_, idx) => ({
                    id: idx,
                    score: 0,
                    completed: false,
                    unlocked: idx === 0,
                    reponses: new Array(data.parties[idx].questions.length).fill(null),
                    reponsesAffichees: new Array(data.parties[idx].questions.length).fill(false),
                    reponsesUtilisateur: new Array(data.parties[idx].questions.length).fill("")
                }))
            };
            partiesEnvoyees = {};
        }
        return data;
    }

    // Vérification et validation avec envoi WhatsApp
    function verifierEtValiderPartie(partieIndex) {
        const partie = quizState.parties[partieIndex];
        const data = QUIZ_DATAS[currentSubject][currentClasse];
        const total = data.parties[partieIndex].questions.length;
        
        const toutesRepondues = partie.reponses.every(r => r !== null);
        if (!toutesRepondues) {
            afficherNotif(`📝 Il te reste ${partie.reponses.filter(r => r === null).length} question(s) sans réponse !`, "warning");
            return false;
        }
        
        const scoreActuel = partie.score;
        const pourcentage = (scoreActuel / total) * 100;
        
        // Calcul du temps écoulé
        const tempsUtilise = 300 - tempsRestant; // 300 secondes max
        const tempsReel = Math.min(tempsUtilise, 300);
        
        if (pourcentage === 100) {
            // SUCCÈS : 100% - validation et envoi WhatsApp
            partie.completed = true;
            
            // Envoyer les résultats par WhatsApp (réussite)
            envoyerResultatsWhatsApp(partieIndex, scoreActuel, total, tempsReel, true);
            partiesEnvoyees[partieIndex] = true;
            
            // DÉBLOQUER LA PARTIE SUIVANTE
            if (partieIndex + 1 < quizState.parties.length) {
                quizState.parties[partieIndex + 1].unlocked = true;
                afficherNotif(`🎉 FÉLICITATIONS ! Score parfait : ${scoreActuel}/${total} !\n✨ PARTIE ${partieIndex + 2} DÉBLOQUÉE ! ✨`, "success");
            } else {
                afficherNotif(`🏆 BRAVO ! Tu as terminé toutes les parties avec un score parfait de ${scoreActuel}/${total} ! 🏆`, "success");
            }
            
            sauvegarderEtat();
            afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
            
            if (timerInterval) clearInterval(timerInterval);
            return true;
        } else {
            // ÉCHEC : moins de 100% - envoi WhatsApp quand même mais pas de déblocage
            envoyerResultatsWhatsApp(partieIndex, scoreActuel, total, tempsReel, false);
            partiesEnvoyees[partieIndex] = true;
            
            afficherNotif(`❌ Score : ${scoreActuel}/${total} (${pourcentage}%) ❌\nIl faut 100% pour valider ! La partie est réinitialisée.`, "warning");
            
            // Réinitialiser la partie
            partie.score = 0;
            partie.completed = false;
            partie.reponses = new Array(total).fill(null);
            partie.reponsesAffichees = new Array(total).fill(false);
            partie.reponsesUtilisateur = new Array(total).fill("");
            
            sauvegarderEtat();
            afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
            return false;
        }
    }

    function afficherInterfaceQuiz(classe, subject, mode) {
        const container = document.getElementById('cardsContainer');
        const data = QUIZ_DATAS[subject][classe];
        const partie = quizState.parties[quizState.currentPartie];
        const currentPartieData = data.parties[quizState.currentPartie];
        const isUnlocked = partie.unlocked;
        const totalQuestions = currentPartieData.questions.length;
        const pourcentage = (partie.score / totalQuestions) * 100;

        let html = `<div class="quiz-active-container">
            <button class="back-btn" onclick="retourAccueil()">← Retour aux quiz</button>
            <div class="timer-container"><span>⏱️ Temps restant :</span><span id="timerDisplay" class="timer-display">05:00</span></div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="badges" id="badgesList"></div>
            <div class="scoreboard" id="scoreboardMini"></div>
            <div class="partie-section">
                <div class="partie-header">
                    <h3>${currentPartieData.emoji} ${currentPartieData.nom}</h3>
                    <div>
                        ${partie.completed ? '✅ COMPLÉTÉ (100%)' : (isUnlocked ? `📊 Score : ${partie.score}/${totalQuestions} (${pourcentage}%)` : '🔒 VERROUILLÉ')}
                    </div>
                </div>
                <div class="partie-content ${!isUnlocked ? 'locked' : ''}" id="questionsContainer"></div>
            </div>
            <div style="display:flex; justify-content:space-between; margin:20px 0">
                <button class="btn-nav" onclick="changerPartie(-1)" ${quizState.currentPartie === 0 ? 'disabled' : ''}>← Précédent</button>
                <button class="btn-nav next" onclick="changerPartie(1)" ${!quizState.parties[quizState.currentPartie + 1]?.unlocked ? 'disabled' : ''}>Suivant →</button>
            </div>`;
        
        if (isUnlocked && !partie.completed) {
            const toutesRepondues = partie.reponses.every(r => r !== null);
            html += `<button class="btn-valider-partie" onclick="verifierEtValiderPartie(${quizState.currentPartie})" ${!toutesRepondues ? 'disabled' : ''}>
                🎯 VALIDER LA PARTIE (100% requis) 🎯
            </button>`;
            if (!toutesRepondues) {
                html += `<div style="text-align:center; margin-top:10px; color:#e74c3c;">⚠️ Réponds à toutes les questions avant de valider ⚠️</div>`;
            }
        } else if (partie.completed) {
            html += `<div class="success-message">🏆 BRAVO ! Score parfait (${partie.score}/${totalQuestions}) ! Résultats envoyés au professeur ! 🏆</div>`;
        }
        
        html += `<button style="background:#e74c3c; color:white; padding:10px 20px; border:none; border-radius:50px; cursor:pointer; margin-top:15px;" onclick="resetQuiz()">🔄 Tout recommencer</button>
        </div>`;
        container.innerHTML = html;

        const questionsDiv = document.getElementById('questionsContainer');
        let qHtml = '';
        currentPartieData.questions.forEach((q, idx) => {
            const reponseVal = partie.reponses[idx];
            const affichee = partie.reponsesAffichees[idx];
            if (q.type === 'probleme') {
                qHtml += genererProblemeHtml(idx, q, reponseVal, partie.reponsesUtilisateur[idx], affichee, isUnlocked && !partie.completed);
            } else if (q.type === 'qcm') {
                qHtml += genererQCMHtml(idx, q, reponseVal, affichee, isUnlocked && !partie.completed);
            } else {
                qHtml += genererVFHtml(idx, q, reponseVal, affichee, isUnlocked && !partie.completed);
            }
        });
        questionsDiv.innerHTML = qHtml;
        
        mettreAJourStats(data);
        if (!partie.completed && isUnlocked) demarrerTimer(quizState.currentPartie, data);
        else if (timerInterval) clearInterval(timerInterval);
    }

    function genererProblemeHtml(idx, q, reponseVal, userVal, affichee, actif) {
        let inputHtml = `<div class="reponse-input"><label>Réponse :</label><input type="number" step="any" id="input-${idx}" value="${userVal || ''}" ${!actif ? 'disabled' : ''}>
            <button class="btn-valider-reponse" onclick="validerProbleme(${idx}, ${q.reponse.correct})" ${!actif ? 'disabled' : ''}>✅ Vérifier</button></div>`;
        let feedback = reponseVal ? `<div class="${reponseVal === 'correct' ? 'feedback-correct' : 'feedback-incorrect'}">${reponseVal === 'correct' ? '✅ Bonne réponse !' : '❌ Incorrect'}</div>` : '';
        return `<div class="question ${reponseVal ? 'answered' : ''}"><strong>📝 ${q.titre}</strong><div style="background:#eef; padding:12px; border-radius:10px; margin:10px 0">${q.enonce}</div>${inputHtml}${feedback}<button class="btn-voir-reponse" onclick="afficherSolution(${idx})" ${!actif || !reponseVal ? 'disabled' : ''}>💡 Voir solution</button><div id="sol-${idx}" class="reponse-cachee" style="display:${affichee ? 'block' : 'none'}"><strong>✨ Explication :</strong> ${q.explication}</div></div>`;
    }

    function genererQCMHtml(idx, q, reponseVal, affichee, actif) {
        let optsHtml = `<ul class="options">${q.options.map((opt, i) => {
            let classe = '';
            if (reponseVal) {
                if (i.toString() === q.correct) classe = 'correct';
                else if (i.toString() === reponseVal) classe = 'incorrect';
            }
            return `<li class="${classe} ${!actif ? 'disabled' : ''}" onclick="repondreQCM(${idx}, ${i})">${opt}</li>`;
        }).join('')}</ul>`;
        return `<div class="question ${reponseVal ? 'answered' : ''}"><div style="font-weight:bold; font-size:1.1em; margin-bottom:10px">❓ ${q.texte}</div>${optsHtml}<button class="btn-voir-reponse" onclick="afficherSolution(${idx})" ${!actif || !reponseVal ? 'disabled' : ''}>💡 Explication</button><div id="sol-${idx}" class="reponse-cachee" style="display:${affichee ? 'block' : 'none'}"><strong>✨ ${q.explication}</strong></div></div>`;
    }

    function genererVFHtml(idx, q, reponseVal, affichee, actif) {
        let optsHtml = `<ul class="options">${["VRAI", "FAUX"].map(opt => {
            let classe = '';
            if (reponseVal) {
                if (opt === q.correct) classe = 'correct';
                else if (opt === reponseVal) classe = 'incorrect';
            }
            return `<li class="${classe} ${!actif ? 'disabled' : ''}" onclick="repondreVF(${idx}, '${opt}')">${opt}</li>`;
        }).join('')}</ul>`;
        return `<div class="question ${reponseVal ? 'answered' : ''}"><div style="font-weight:bold; font-size:1.1em; margin-bottom:10px">❓ ${q.texte}</div>${optsHtml}<button class="btn-voir-reponse" onclick="afficherSolution(${idx})" ${!actif || !reponseVal ? 'disabled' : ''}>💡 Explication</button><div id="sol-${idx}" class="reponse-cachee" style="display:${affichee ? 'block' : 'none'}"><strong>✨ ${q.explication}</strong></div></div>`;
    }

    window.validerProbleme = function(idx, correctVal) {
        const input = document.getElementById(`input-${idx}`);
        if (!input) return;
        let user = parseFloat(input.value.trim());
        if (isNaN(user)) { afficherNotif("Entrez un nombre", "warning"); return; }
        const partie = quizState.parties[quizState.currentPartie];
        if (partie.reponses[idx] !== null) return;
        const estCorrect = (Math.abs(user - correctVal) < 0.01);
        partie.reponses[idx] = estCorrect ? "correct" : "incorrect";
        partie.reponsesUtilisateur[idx] = user;
        if (estCorrect) partie.score++;
        sauvegarderEtat();
        afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
        afficherNotif(estCorrect ? "✅ Bonne réponse !" : "❌ Incorrect", estCorrect ? "success" : "warning");
    };

    window.repondreQCM = function(idx, choixIndex) {
        const partie = quizState.parties[quizState.currentPartie];
        if (partie.reponses[idx] !== null) return;
        const q = QUIZ_DATAS[currentSubject][currentClasse].parties[quizState.currentPartie].questions[idx];
        const estCorrect = (choixIndex.toString() === q.correct);
        partie.reponses[idx] = choixIndex.toString();
        if (estCorrect) partie.score++;
        sauvegarderEtat();
        afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
    };

    window.repondreVF = function(idx, rep) {
        const partie = quizState.parties[quizState.currentPartie];
        if (partie.reponses[idx] !== null) return;
        const q = QUIZ_DATAS[currentSubject][currentClasse].parties[quizState.currentPartie].questions[idx];
        const estCorrect = (rep === q.correct);
        partie.reponses[idx] = rep;
        if (estCorrect) partie.score++;
        sauvegarderEtat();
        afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
    };

    window.afficherSolution = function(idx) {
        const partie = quizState.parties[quizState.currentPartie];
        if (partie.reponses[idx] === null) return;
        partie.reponsesAffichees[idx] = !partie.reponsesAffichees[idx];
        sauvegarderEtat();
        afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
    };

    function changerPartie(delta) {
        const newIdx = quizState.currentPartie + delta;
        if (newIdx >= 0 && newIdx < quizState.parties.length && quizState.parties[newIdx].unlocked) {
            quizState.currentPartie = newIdx;
            sauvegarderEtat();
            afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
        } else if (newIdx >= 0 && newIdx < quizState.parties.length && !quizState.parties[newIdx].unlocked) {
            afficherNotif("🔒 Partie verrouillée ! Tu dois obtenir 100% dans la partie précédente pour débloquer celle-ci.", "warning");
        }
    }

    function demarrerTimer(partieIndex, data) {
        if (timerInterval) clearInterval(timerInterval);
        tempsRestant = 300;
        const timerDisplay = document.getElementById('timerDisplay');
        if (timerDisplay) {
            const update = () => {
                const mins = Math.floor(Math.max(0, tempsRestant) / 60);
                const secs = Math.floor(Math.max(0, tempsRestant) % 60);
                timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };
            update();
            timerInterval = setInterval(() => {
                tempsRestant--;
                update();
                if (tempsRestant <= 0) {
                    clearInterval(timerInterval);
                    if (!quizState.parties[partieIndex].completed) {
                        afficherNotif("⏰ Temps écoulé ! La partie va être réinitialisée.", "warning");
                        const total = data.parties[partieIndex].questions.length;
                        const partie = quizState.parties[partieIndex];
                        envoyerResultatsWhatsApp(partieIndex, partie.score, total, 300, false);
                        partie.score = 0;
                        partie.reponses = new Array(total).fill(null);
                        partie.reponsesAffichees = new Array(total).fill(false);
                        partie.reponsesUtilisateur = new Array(total).fill("");
                        sauvegarderEtat();
                        afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
                    }
                }
            }, 1000);
        }
    }

    function mettreAJourStats(data) {
        let totalQ = 0, totalR = 0;
        quizState.parties.forEach((p, i) => { totalQ += data.parties[i].questions.length; totalR += p.reponses.filter(r => r !== null).length; });
        const progressBar = document.getElementById('progressBar');
        if (progressBar) progressBar.style.width = `${(totalR / totalQ) * 100}%`;
        const badgesDiv = document.getElementById('badgesList');
        if (badgesDiv) badgesDiv.innerHTML = quizState.parties.map((p, i) => `<div class="badge ${p.completed ? 'unlocked' : ''}">${p.completed ? '🏆' : (p.unlocked ? '📝' : '🔒')} ${data.parties[i].nom}</div>`).join('');
        const scoreDiv = document.getElementById('scoreboardMini');
        if (scoreDiv) scoreDiv.innerHTML = quizState.parties.map((p, i) => {
            const total = data.parties[i].questions.length;
            let statusClass = '';
            if (p.completed) statusClass = 'completed';
            else if (!p.unlocked) statusClass = 'locked';
            if (i === quizState.currentPartie) statusClass += ' current';
            return `<div class="partie-score ${statusClass}"><h4>${data.parties[i].nom}</h4><div>${p.score}/${total}</div><div class="requirement">${p.completed ? '✅ Validé 100%' : (p.unlocked ? '🎯 100% requis' : '🔒 Verrouillé')}</div></div>`;
        }).join('');
    }

    window.resetQuiz = function() {
        if (confirm("⚠️ Recommencer tout le quiz ? Toute progression sera perdue.")) {
            localStorage.removeItem(`quiz_${currentSubject}_${currentClasse}_${currentMode}_${nomEleve}_${prenomEleve}`);
            initQuizState(currentClasse, currentSubject, currentMode);
            afficherInterfaceQuiz(currentClasse, currentSubject, currentMode);
        }
    };

    window.verifierEtValiderPartie = verifierEtValiderPartie;
    window.retourAccueil = function() {
        if (timerInterval) clearInterval(timerInterval);
        currentMode = null;
        chargerCartes(currentClasse, currentSubject);
    };

    function chargerCartes(classe, subject) {
        const container = document.getElementById('cardsContainer');
        const modes = [
            { id: "problemes", titre: "Problèmes", emoji: "📝", desc: "Exercices et calculs", bg: "problemes" },
            { id: "quiz", titre: "Quiz QCM", emoji: "❓", desc: "Questions à choix multiples", bg: "quiz" },
            { id: "vrai-faux", titre: "Vrai / Faux", emoji: "✅❌", desc: "Affirmations à valider", bg: "vrai-faux" }
        ];
        
        let html = '';
        for (let m of modes) {
            html += `
                <div class="card" data-mode="${m.id}">
                    <div class="card-header ${m.bg}">
                        <span class="emoji">${m.emoji}</span>
                        <h3>${m.titre}</h3>
                    </div>
                    <div class="card-body">
                        <div class="description">${m.desc} - ${classe}ème ${getSubjectName(subject)}</div>
                        <div class="stats">⏱️ 5 min/partie | 📧 Envoi WhatsApp automatique</div>
                        <button class="start-btn" data-mode="${m.id}">🚀 Commencer</button>
                    </div>
                </div>`;
        }
        container.innerHTML = html;

        document.querySelectorAll('.start-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const mode = btn.getAttribute('data-mode');
                const m = modes.find(m => m.id === mode);
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `<div class="modal-content"><h2>🌟 ${m.titre} - ${getSubjectName(subject)} ${classe}ème 🌟</h2><p>Entre ton NOM :</p><input type="text" id="nomInputModal" placeholder="Ton nom" style="margin-bottom:5px"><p>Entre ton PRÉNOM :</p><input type="text" id="prenomInputModal" placeholder="Ton prénom"><button id="confirmBtn">Commencer</button></div>`;
                document.body.appendChild(modal);
                document.getElementById('confirmBtn').onclick = () => {
                    const nom = document.getElementById('nomInputModal').value.trim();
                    const prenom = document.getElementById('prenomInputModal').value.trim();
                    if (!nom || !prenom) return alert("Entre ton nom ET ton prénom !");
                    nomEleve = nom;
                    prenomEleve = prenom;
                    currentMode = mode;
                    currentClasse = classe;
                    currentSubject = subject;
                    initQuizState(classe, subject, mode);
                    modal.remove();
                    afficherInterfaceQuiz(classe, subject, mode);
                };
            });
        });
    }

    function getSubjectName(subject) {
        const names = { maths: "Maths", physique: "Physique", chimie: "Chimie", techno: "Technologie" };
        return names[subject];
    }

    document.querySelectorAll('.class-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.class-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentClasse = tab.getAttribute('data-classe');
            if (!currentMode) chargerCartes(currentClasse, currentSubject);
            else retourAccueil();
        });
    });

    document.querySelectorAll('.subject-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentSubject = tab.getAttribute('data-subject');
            if (!currentMode) chargerCartes(currentClasse, currentSubject);
            else retourAccueil();
        });
    });

    chargerCartes("6", "maths");
</script>
</body>
</html>
